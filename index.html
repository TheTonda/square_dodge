<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Dodge Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            max-width: 95vw;
            max-height: 70vh;
        }
        .ui {
            margin-bottom: 10px;
            text-align: center;
        }
        h1 { margin: 10px 0; }
        .instructions { font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>

    <div class="ui">
        <h1>Square Dodge</h1>
        <p class="instructions">Use <b>Arrow Keys</b> or <b>WASD</b> to move. Don't hit the red squares!</p>
        <h2 id="scoreBoard">Score: 0</h2>
    </div>

    <canvas id="gameCanvas" width="600" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreBoard = document.getElementById('scoreBoard');

        // Game State
        let score = 0;
        let gameActive = true;
        let speedMultiplier = 1;

        // Player Object
        const player = {
            x: 300,
            y: 200,
            size: 20,
            color: '#00ffcc',
            speed: 5
        };

        // Obstacles
        const enemies = [];
        function spawnEnemy() {
            const size = Math.random() * (40 - 15) + 15;
            enemies.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                size: size,
                speed: (Math.random() * 3 + 2) * speedMultiplier,
                color: '#ff4444'
            });
        }

        // Input Handling
        const keys = {};
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function update() {
            if (!gameActive) return;

            // Move Player
            if ((keys['arrowup'] || keys['w']) && player.y > 0) player.y -= player.speed;
            if ((keys['arrowdown'] || keys['s']) && player.y < canvas.height - player.size) player.y += player.speed;
            if ((keys['arrowleft'] || keys['a']) && player.x > 0) player.x -= player.speed;
            if ((keys['arrowright'] || keys['d']) && player.x < canvas.width - player.size) player.x += player.speed;

            // Update Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.y += e.speed;

                // Collision Detection
                if (
                    player.x < e.x + e.size &&
                    player.x + player.size > e.x &&
                    player.y < e.y + e.size &&
                    player.y + player.size > e.y
                ) {
                    gameActive = false;
                    alert(`Game Over! Your score: ${Math.floor(score)}`);
                    location.reload(); // Restart game
                }

                // Remove off-screen enemies and increase score
                if (e.y > canvas.height) {
                    enemies.splice(i, 1);
                    score += 10;
                    scoreBoard.innerText = `Score: ${Math.floor(score)}`;
                    // Gradually increase difficulty
                    speedMultiplier += 0.005;
                }
            }

            // Spawn rate
            if (Math.random() < 0.03) spawnEnemy();
        }

        function draw() {
            // Clear Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // Draw Enemies
            for (const e of enemies) {
                ctx.fillStyle = e.color;
                ctx.fillRect(e.x, e.y, e.size, e.size);
            }

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
    </script>
</body>
</html>
